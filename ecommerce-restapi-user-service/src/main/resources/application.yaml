spring:
  datasource:
    url:      jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${USERS_DB}
    username: ${USERS_DB_USER}
    password: ${USERS_DB_PASSWORD}
  jpa:
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false
        use_sql_comments: false
  liquibase:
    enabled: true
  output:
    ansi:
      enabled: always

decorator:
  datasource:
    enabled: true
    datasource-proxy:
      logging: slf4j
      multiline: true
      format-sql: true
      query:
        enable-logging: true
      slow-query:
        enable-logging: true
        log-level: warn

logging:
  level:
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off
    net.ttddyy.dsproxy.listener: debug
