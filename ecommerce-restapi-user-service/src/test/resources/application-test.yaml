spring:
  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false
        use_sql_comments: false
  liquibase:
    enabled: true
  cache:
    type: none
  output:
    ansi:
      enabled: always

decorator:
  datasource:
    datasource-proxy:
      logging:          slf4j
      query:
        enable-logging: false
      slow-query:
        enable-logging: true
      json-format:      false
      count-query:      true
      format-sql:       true
      multiline:        true

logging:
  level:
    org.hibernate.SQL:           off
    org.hibernate.orm.jdbc.bind: off
    net.ttddyy.dsproxy.listener: debug
