databaseChangeLog:
  - changeSet:
      id: 004
      author: Alexander Dudkin
      changes:
        - createTable:
            tableName: shedlock
            columns:
              - column:
                  name: name
                  type: VARCHAR(64)
                  constraints:
                    primaryKey: true
              - column:
                  name: lock_until
                  type: TIMESTAMP WITHOUT TIMEZONE
                  constraints:
                    nullable: false
              - column:
                  name: locked_at
                  type: TIMESTAMP WITHOUT TIMEZONE
                  constraints:
                    nullable: false
              - column:
                  name: locked_by
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
