spring:
  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false
        use_sql_comments: false
  liquibase:
    enabled: true
  cache:
    type: none
  output:
    ansi:
      enabled: always

decorator:
  datasource:
    enabled: true
    datasource-proxy:
      logging: slf4j
      multiline: true
      format-sql: true
      query:
        enable-logging: true
        log-level: debug
      slow-query:
        enable-logging: true
        log-level: warn

logging:
  level:
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off
    net.ttddyy.dsproxy.listener: debug
