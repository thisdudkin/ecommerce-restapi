management:
  endpoints:
    web:
      exposure:
        include: health,info

gateway:
  routes:
    user-service-uri:    ${USER_SERVICE_URI:http://localhost:8081}
    auth-service-uri:    ${AUTH_SERVICE_URI:http://localhost:8082}
    order-service-uri:   ${ORDER_SERVICE_URI:http://localhost:8083}
    payment-service-uri: ${PAYMENT_SERVICE_URI:http://localhost:8084}

  auth-client:
    base-url:           ${gateway.routes.auth-service-uri}
    validate-path:      /api/v1/auth/validate
    connect-timeout-ms: 2000
    read-timeout-ms:    3000

  auth-cache:
    ttl:        30s
    key-prefix: auth-validate

  http-timeouts:
    connect-timeout-ms:  2000
    response-timeout-ms: 5000

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  output:
    ansi:
      enabled: always

---
spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

gateway:
  routes:
    user-service-uri:    ${USER_SERVICE_URI:http://user-service:8081}
    auth-service-uri:    ${AUTH_SERVICE_URI:http://authentication-service:8082}
    order-service-uri:   ${ORDER_SERVICE_URI:http://order-service:8083}
    payment-service-uri: ${PAYMENT_SERVICE_URI:http://payment-service:8084}
