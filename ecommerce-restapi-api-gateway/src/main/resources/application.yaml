management:
  endpoints:
    web:
      exposure:
        include: health,info

gateway:
  routes:
    user-service-uri: ${USER_SERVICE_URI:http://localhost:8081}
    auth-service-uri: ${AUTH_SERVICE_URI:http://localhost:8082}
    order-service-uri: ${ORDER_SERVICE_URI:http://localhost:8083}

  auth-client:
    base-url: ${AUTH_SERVICE_BASE_URL:http://localhost:8082}
    validate-path: ${AUTH_VALIDATE_PATH:/api/v1/auth/validate}
    connect-timeout-ms: 2000
    read-timeout-ms: 3000

  auth-cache:
    ttl: ${AUTH_CACHE_TTL:30s}
    key-prefix: ${AUTH_CACHE_KEY_PREFIX:auth:validate:}

  http-timeouts:
    connect-timeout-ms: 2000
    response-timeout-ms: 5000

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  output:
    ansi:
      enabled: always
